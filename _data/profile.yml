short_bio: >-
  <p>
    Hao Li is a undergradudate student at Southwest University of Science and Technology, 
    majoring in Electronic Information Engineering (National First-class Undergraduate Major). 
    Since joining the <a href="https://info.swust.edu.cn/tssys/main.htm" target="_blank" rel="noopener noreferrer">Robot Technology Used for Special Environment Key Laboratory of Sichuan Province</a> in his sophomore year,
    he has began to explore the field of inertial gait recognition, with a particular focus on the robust recognition under disguised conditions.
    Then he has participated in paper research, dataset construction, algorithm implementation, and paper writing, developing strong interests in pattern recognition, temporal modeling,and unsupervised domain adaptation.
    In the future, he hopes to extend his reseach towards audio-visual perception and spatial perception intelligence-enabled dexterous manipulation and embodied navigation.
  </p>
  <p>
    李皓，本科，电子信息工程（国家级一流本科）。自大二加入特殊环境机器人技术四川省重点实验室，他开始在步态识别领域进行学习和探索，专注于伪装条件下的鲁棒识别。
    此后他继续研读论文、构建数据集、复现算法、开展论文写作，并在模式识别、时序建模和无监督域适应上展现出极大兴趣。
    未来，他希望在视-听感知<br/>与空间感知智能赋能的灵巧操作和具身导航领域继续探索。
  </p>

